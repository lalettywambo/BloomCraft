<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BloomCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            font-family:'Poppins', sans-serif;
        }

        .heading{
            font-family:'Playfair Display', serif;
        }
    </style>
</head>
<body class="bg-white-100">

    <!-- NAVBAR -->

<nav class="bg-pink-200 shadow-sm relative">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-3xl heading text-pink-600">BloomCraft</h1>

        <input type="checkbox" id="menu-toggle" class="hidden peer">

        <ul class="hidden peer-checked:flex peer-checked:flex-col peer-checked:absolute peer-checked:top-16 peer-checked:left-0 peer-checked:w-full peer-checked:bg-pink-200 peer-checked:px-6 peer-checked:py-4 peer-checked:shadow-md md:flex gap-8 font-medium">
            <li><a href="index.html" class="hover:text-pink-600">Home</a></li>
            <li><a href="shop.html" class="hover:text-pink-600">Shop Flowers</a></li>
            <li><a href="bouquet.html" class="hover:text-pink-600">Build a Bouquet</a></li>
            <li><a href="occassion.html" class="hover:text-pink-600">Occasions</a></li>
            <li><a href="about.html" class="hover:text-pink-600">About Us</a></li>
            <li><a href="contact.html" class="hover:text-pink-600">Contact</a></li>
        </ul>

        <div class="flex gap-4 items-center">
            <a href="login.html"><i class="fa-regular fa-user text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <label for="menu-toggle" class="md:hidden text-gray-700 text-2xl cursor-pointer">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

    </div>
</nav>

    <!-- Header -->
    <section class="py-12 text-center">
        <h1 class="text-4xl font-serif text-gray-800">Contact Us</h1>
        <p class="text-gray-500 mt-2">We'd love to hear from you!</p>
    </section>

    <!-- Contact Section -->
    <section class="max-w-6xl mx-auto px-6 pb-12">

        <div class="grid md:grid-cols-3 gap-8">

            <!-- Contact Details -->
            <div class="bg-white p-8 rounded-lg shadow">

                <div class="mb-8">
                    <h3 class="font-semibold text-lg">Phone</h3>
                    <p class="text-gray-600">+254 712 345 678</p>
                </div>

                <div class="mb-8">
                    <h3 class="font-semibold text-lg">Email</h3>
                    <p class="text-gray-600">hello@bloomcraft.com</p>
                </div>

                <div class="mb-8">
                    <h3 class="font-semibold text-lg">Address</h3>
                    <p class="text-gray-600">
                        Nairobi, Kenya
                    </p>
                </div>

                <div>
                    <h3 class="font-semibold text-lg">Hours</h3>
                    <p class="text-gray-600">
                        Mon - Sun: 8:00 AM - 8:00 PM
                    </p>
                </div>

            </div>

            <!-- Form -->
            <div class="md:col-span-2 bg-white p-8 rounded-lg shadow">

                <form class="space-y-4">

                    <div>
                        <label class="block mb-2 text-gray-700">
                            Your Name
                        </label>
                        <input
                            type="text"
                            placeholder="Enter your name"
                            class="w-full border rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-pink-300">
                    </div>

                    <div>
                        <label class="block mb-2 text-gray-700">
                            Email Address
                        </label>
                        <input
                            type="email"
                            placeholder="Enter your email"
                            class="w-full border rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-pink-300">
                    </div>

                    <div>
                        <label class="block mb-2 text-gray-700">
                            Message
                        </label>

                        <textarea
                            rows="6"
                            placeholder="Write your message..."
                            class="w-full border rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-pink-300"></textarea>
                    </div>

                    <button
                        type="submit"
                        class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-md transition">
                        SEND MESSAGE
                    </button>

                </form>

            </div>

        </div>

    </section>

</body>
</html>
