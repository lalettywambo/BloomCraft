<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomCraft | Craft Your Perfect Bouquet</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins', sans-serif;
        }

        .heading{
            font-family:'Playfair Display', serif;
        }
    </style>
</head>

<body class="bg-pink-50">

<!-- NAVBAR -->

<nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-3xl heading text-pink-600">
            BloomCraft
        </h1>

        <ul class="hidden md:flex gap-8 font-medium">
            <li><a href="#" class="hover:text-pink-600">Home</a></li>
            <li><a href="#" class="hover:text-pink-600">Shop Flowers</a></li>
            <li><a href="#" class="hover:text-pink-600">Build a Bouquet</a></li>
            <li><a href="#" class="hover:text-pink-600">Occasions</a></li>
            <li><a href="#" class="hover:text-pink-600">About Us</a></li>
            <li><a href="#" class="hover:text-pink-600">Contact</a></li>
        </ul>

    </div>
</nav>

<!-- HERO SECTION -->

<section class="max-w-7xl mx-auto px-6 py-20">

    <div class="grid md:grid-cols-2 gap-12 items-center">

        <div>

            <p class="uppercase tracking-widest text-pink-500 font-semibold mb-4">
                Fresh Flowers Made For You
            </p>

            <h2 class="heading text-5xl md:text-6xl font-bold text-gray-800 mb-6">
                Craft Your Perfect Bouquet
            </h2>

            <p class="text-gray-600 text-lg mb-8">
                Browse beautiful blooms, create personalized bouquets,
                and celebrate every occasion with flowers crafted just for you.
            </p>

            <div class="flex gap-4">

                <button class="bg-pink-500 text-white px-8 py-3 rounded-full hover:bg-pink-600">
                    Shop Flowers
                </button>

                <button class="border-2 border-pink-500 text-pink-500 px-8 py-3 rounded-full hover:bg-pink-500 hover:text-white">
                    Build A Bouquet
                </button>

            </div>

        </div>

        <div>

            <img
                src="images/hero/hero1.jpg"
                alt="Flower Bouquet"
                class="rounded-3xl shadow-xl w-full"
            >

        </div>

    </div>

</section>

</body>
</html>
