<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomCraft | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-pink-200 shadow-sm relative">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-3xl heading text-pink-600">BloomCraft</h1>

        <input type="checkbox" id="menu-toggle" class="hidden peer">

        <ul class="hidden peer-checked:flex peer-checked:flex-col peer-checked:absolute peer-checked:top-16 peer-checked:left-0 peer-checked:w-full peer-checked:bg-pink-200 peer-checked:px-6 peer-checked:py-4 peer-checked:shadow-md md:flex gap-8 font-medium">
            <li><a href="index.html" class="hover:text-pink-600">Home</a></li>
            <li><a href="shop.html" class="hover:text-pink-600">Shop Flowers</a></li>
            <li><a href="bouquet.html" class="hover:text-pink-600">Build a Bouquet</a></li>
            <li><a href="occassion.html" class="hover:text-pink-600">Occasions</a></li>
            <li><a href="about.html" class="hover:text-pink-600">About Us</a></li>
            <li><a href="contact.html" class="hover:text-pink-600">Contact</a></li>
        </ul>

        <div class="flex gap-4 items-center">
            <a href="login.html"><i class="fa-regular fa-user text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <label for="menu-toggle" class="md:hidden text-gray-700 text-2xl cursor-pointer">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

    </div>
</nav>

<div class="min-h-screen flex items-center justify-center px-4 py-20">

    <div class="bg-white shadow-xl rounded-3xl p-10 w-full max-w-md">

        <h2 class="heading text-3xl font-bold text-gray-800 mb-2 text-center">Welcome Back</h2>
        <p class="text-gray-500 text-sm text-center mb-8">Login to your BloomCraft account</p>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" placeholder="you@example.com"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-pink-400">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" placeholder="••••••••"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-pink-400">
        </div>

        <a href="index.html">
            <button class="w-full bg-pink-600 text-white py-3 hover:bg-pink-500 rounded-lg font-medium">
                Login
            </button>
        </a>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account?
            <a href="register.html" class="text-pink-600 font-medium hover:underline">Register</a>
        </p>

    </div>

</div>

</body>
</html>
