<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloomCraft | Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-pink-200 shadow-sm relative">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-3xl heading text-pink-600">BloomCraft</h1>

        <input type="checkbox" id="menu-toggle" class="hidden peer">

        <ul class="hidden peer-checked:flex peer-checked:flex-col peer-checked:absolute peer-checked:top-16 peer-checked:left-0 peer-checked:w-full peer-checked:bg-pink-200 peer-checked:px-6 peer-checked:py-4 peer-checked:shadow-md md:flex gap-8 font-medium">
            <li><a href="index.html" class="hover:text-pink-600">Home</a></li>
            <li><a href="shop.html" class="hover:text-pink-600">Shop Flowers</a></li>
            <li><a href="bouquet.html" class="hover:text-pink-600">Build a Bouquet</a></li>
            <li><a href="occassion.html" class="hover:text-pink-600">Occasions</a></li>
            <li><a href="about.html" class="hover:text-pink-600">About Us</a></li>
            <li><a href="contact.html" class="hover:text-pink-600">Contact</a></li>
        </ul>

        <div class="flex gap-4 items-center">
            <a href="login.html"><i class="fa-regular fa-user text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping text-gray-700 hover:text-pink-600 text-xl"></i></a>
            <label for="menu-toggle" class="md:hidden text-gray-700 text-2xl cursor-pointer">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

    </div>
</nav>

<div class="max-w-5xl mx-auto px-6 py-16">

    <h2 class="heading text-3xl font-bold text-gray-800 mb-8">Your Cart</h2>

    <div class="grid md:grid-cols-3 gap-8">

        <!-- Cart Items -->
        <div class="md:col-span-2 flex flex-col gap-4">

            <div class="bg-white rounded-2xl shadow p-4 flex items-center gap-4">
                <img src="assets/images/examples/sunshinebloom.jpg" class="w-20 h-20 object-cover rounded-xl">
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-800">Sunshine Bloom</h3>
                    <p class="text-sm text-gray-500">Ksh 2000</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="w-7 h-7 border border-gray-300 rounded text-gray-600 hover:border-pink-400">−</button>
                    <span class="text-sm font-medium">1</span>
                    <button class="w-7 h-7 border border-gray-300 rounded text-gray-600 hover:border-pink-400">+</button>
                </div>
                <i class="fa-regular fa-trash-can text-gray-400 hover:text-pink-500 cursor-pointer ml-2"></i>
            </div>

            <div class="bg-white rounded-2xl shadow p-4 flex items-center gap-4">
                <img src="assets/images/examples/romanticblush.jpg" class="w-20 h-20 object-cover rounded-xl">
                <div class="flex-1">
                    <h3 class="font-semibold text-gray-800">Romantic Blush</h3>
                    <p class="text-sm text-gray-500">Ksh 3500</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="w-7 h-7 border border-gray-300 rounded text-gray-600 hover:border-pink-400">−</button>
                    <span class="text-sm font-medium">1</span>
                    <button class="w-7 h-7 border border-gray-300 rounded text-gray-600 hover:border-pink-400">+</button>
                </div>
                <i class="fa-regular fa-trash-can text-gray-400 hover:text-pink-500 cursor-pointer ml-2"></i>
            </div>

        </div>

        <!-- Order Summary -->
        <div class="bg-white rounded-2xl shadow p-6 h-fit">

            <h3 class="font-bold text-gray-800 text-lg mb-4">Order Summary</h3>

            <div class="flex justify-between text-sm text-gray-600 mb-2">
                <span>Subtotal</span>
                <span>Ksh 5500</span>
            </div>
            <div class="flex justify-between text-sm text-gray-600 mb-2">
                <span>Delivery</span>
                <span class="text-green-500">Free</span>
            </div>
            <div class="border-t border-gray-100 my-4"></div>
            <div class="flex justify-between font-bold text-gray-800 mb-6">
                <span>Total</span>
                <span>Ksh 5500</span>
            </div>

            <a href="index.html">
                <button class="w-full bg-pink-600 text-white py-3 hover:bg-pink-500 rounded-lg font-medium">
                    Checkout
                </button>
            </a>

        </div>

    </div>

</div>

</body>
</html>
